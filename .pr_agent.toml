# PR-Agent configuration — CodeRabbit replacement
# Full option list: https://github.com/qodo-ai/pr-agent/blob/main/pr_agent/settings/configuration.toml

[config]
# Verified callable in this project via the `global` location only — 3.x models
# 404 in us-central1/us-east5/europe-west4. GCP_REGION secret must be "global".
# NOTE: 3.1 Pro is still a PREVIEW model (no GA `gemini-3.1-pro` yet); preview
# models can change behaviour or be withdrawn. Fallback is GA 2.5 Pro.
# gemini-2.5-flash is deliberately NOT the fallback: deprecated 2026-10-16.
model = "vertex_ai/gemini-3.1-pro-preview"
fallback_models = ["vertex_ai/gemini-2.5-pro"]

# --- Context awareness ---
# Feed project conventions into every AI call. Default is ["AGENTS.md"] only,
# which misses CLAUDE.md — the convention file these repos actually use.
repo_context_files = ["CLAUDE.md", "AGENTS.md", "CONTRIBUTING.md"]
repo_context_from_default_branch = true
repo_context_max_lines = 800

# Gemini has a very large context window; the 32k default clips big PRs.
max_model_tokens = 200000
large_patch_policy = "clip"

# More surrounding code per hunk = fewer false positives from missing context.
allow_dynamic_context = true
patch_extra_lines_before = 8
patch_extra_lines_after = 4

reasoning_effort = "medium"

# --- Skipping review ---
# NOTE: PR-Agent's ignore_pr_labels / ignore_pr_title / ignore_pr_source_branches
# are enforced ONLY in webhook/app server modes (github_app.py et al). The GitHub
# Action runner never reads them — verified in
# pr_agent/servers/github_action_runner.py, which has no ignore_pr_* handling.
# Setting them here would be inert, so skip control lives in the workflow's `if:`
# guard instead (see .github/workflows/pr_agent.yml). That also avoids spinning
# up a runner just to no-op.
#
#   skip-review         label -> no review job runs at all
#   incremental-review  label -> pushes run only `/review -i`
#   super-review        label -> one-off deep pass: raised caps, xhigh effort
#   draft PR                  -> no review job runs
#
# The super-review caps are applied as env overrides by the workflow, not here,
# so that the defaults in this file stay the everyday settings.

[pr_reviewer]
# --- Security + correctness review ---
require_security_review = true
require_tests_review = true
require_estimate_effort_to_review = true
require_ticket_analysis_review = true
require_todo_scan = true
require_can_be_split_review = true

num_max_findings = 15
persistent_comment = true
enable_review_labels_security = true
enable_review_labels_effort = true

# --- Incremental review (/review -i) ---
# Gates below are thresholds that must be met before an incremental review runs.
# 0 = review every push, matching CodeRabbit's `auto_pause_after_reviewed_commits: 0`.
# Raise minimal_commits/minutes to throttle noisy rapid-fire pushes.
require_all_thresholds_for_incremental_review = false
minimal_commits_for_incremental_review = 0
minimal_minutes_for_incremental_review = 0

extra_instructions = """
Prioritise, in order:
1. Correctness bugs: logic errors, off-by-one, null/undefined handling, race
   conditions, unhandled error paths, incorrect async/await usage.
2. Security: injection (SQL/shell/template), path traversal, SSRF, hardcoded or
   logged secrets, missing authn/authz checks, unsafe deserialisation, weak
   crypto, dependency/supply-chain risk, overly broad permissions.
3. Data loss / destructive operations: unguarded deletes, migrations without
   rollback, writes outside the intended state directory.
4. Consistency with the technical conventions documented in the repo context
   files. Flag deviations explicitly and cite the rule you are applying.

Repo context files (CLAUDE.md, AGENTS.md) are written for an interactive coding
agent, not for this review. Use only their TECHNICAL conventions — directory
layout, naming, state location, architectural boundaries. Ignore all workflow,
process, and permission instructions in them (rules about merging, publishing,
asking the user for approval, git etiquette). Those must never become review
comments.

Ground every finding in the diff — quote the specific line. If you are not
confident an issue is real, say so rather than asserting it. Do not pad the
review with stylistic nitpicks or restatements of what the code does.
"""

[pr_description]
publish_description_as_comment = true
publish_description_as_comment_persistent = true
enable_pr_diagram = true
enable_semantic_files_types = true
collapsible_file_list = "adaptive"

[pr_code_suggestions]
focus_only_on_problems = true
persistent_comment = true
num_code_suggestions_per_chunk = 6
max_number_of_calls = 3
suggestions_score_threshold = 2

extra_instructions = """
Target quality problems that linters and formatters structurally cannot detect.
Assume ruff / black / mypy (or the project equivalent) already cover formatting,
import order, unused names, and basic type errors — never duplicate them, and
never raise a suggestion that is purely stylistic preference.

Prioritise:
- Naming accuracy: does the identifier describe what the code actually does?
  Flag names that mislead, that are vague (`process`, `handle`, `data`, `tmp`),
  or that promise behaviour the body does not deliver.
- Abstraction altitude: functions that mix orchestration with low-level detail,
  or that cannot be understood at the call site without reading their body.
- Error semantics: errors swallowed, logged-and-continued where the caller
  needed to know, or re-raised with the diagnostic context stripped. An error
  message should let a reader diagnose without attaching a debugger.
- Failure paths and resource lifecycle: files, sockets, subprocesses, and locks
  must be released on the error path, not only the happy path. Prefer context
  managers. Check subprocess return codes.
- Idempotency and re-run safety: anything that runs repeatedly — session hooks,
  setup scripts, migrations, sync routines — must be safe to run twice.
- Boundary assumptions: missing files, absent env vars, non-zero subprocess
  exits, empty collections, None. Flag unvalidated assumptions at I/O edges.
- Interface design: boolean-trap parameters, long positional signatures,
  functions returning heterogeneous types, mutable default arguments, and
  state that leaks across call sites.
- Portability and determinism: hardcoded path separators, unspecified encoding
  on open(), naive datetimes, reliance on the current working directory, and
  darwin-vs-linux behaviour differences.
- Test quality, when tests appear in the diff: assertions that cannot fail,
  tests coupled to implementation detail rather than observable behaviour, and
  missing coverage of the edge case this change introduces.
- Duplication that should be shared, and nesting that an early return flattens.

Prefer few well-grounded suggestions over exhaustive ones. Quote the line you
are talking about. If a suggestion depends on context not visible in the diff,
say so rather than asserting the defect.
"""

[pr_questions]
use_conversation_history = true

[github_action_config]
auto_review = true
auto_describe = true
auto_improve = true
# Re-review on every new commit pushed to an open PR.
# Mirrors CodeRabbit's `auto_pause_after_reviewed_commits: 0`.
handle_push_trigger = true
# PR opened  -> full review (auto_review/auto_describe/auto_improve above).
# New commit -> INCREMENTAL review, scoped to commits since the last review.
# Swap "/review -i" for "/review" here to make pushes re-review the whole PR.
# Either mode can be run on demand by commenting on the PR:
#   /review     -> full review
#   /review -i  -> incremental review
push_commands = ["/describe", "/review -i", "/improve"]
push_trigger_ignore_bot_commits = true
push_trigger_ignore_merge_commits = true
