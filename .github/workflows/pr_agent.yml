name: PR-Agent Reviewer

# CodeRabbit replacement — see .pr_agent.toml for review configuration.
#
# Per-PR controls (labels):
#   skip-review         no review runs at all
#   incremental-review  pushes run only `/review -i` (no describe/improve churn)
#   super-review        one-off deep pass: xhigh effort, raised caps, no filtering
#   (draft PR)          no review runs until marked ready
#
# On-demand, by commenting on the PR:
#   /review     full review        /review -i  incremental review
#   /improve    code suggestions   /ask <q>    question about the PR
on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created, edited]

jobs:
  pr_agent_job:
    # Skip drafts and any PR labelled `skip-review`. Gating here rather than in
    # .pr_agent.toml is deliberate: PR-Agent's ignore_pr_labels is not honoured
    # by the GitHub Action runner, and this avoids starting a runner at all.
    if: >-
      (github.event_name == 'pull_request'
        && github.event.pull_request.draft == false
        && !contains(github.event.pull_request.labels.*.name, 'skip-review'))
      || (github.event_name == 'issue_comment'
        && github.event.issue.pull_request != null
        && !contains(github.event.issue.labels.*.name, 'skip-review'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    name: Run PR Agent
    steps:
      - name: Select review depth
        id: depth
        env:
          IS_SUPER: ${{ contains(github.event.pull_request.labels.*.name, 'super-review') || contains(github.event.issue.labels.*.name, 'super-review') }}
          IS_INCREMENTAL: ${{ contains(github.event.pull_request.labels.*.name, 'incremental-review') }}
        run: |
          if [ "$IS_SUPER" = "true" ]; then
            # One-off deep pass: widen generation, drop the confidence floor,
            # more surrounding context, and a full (not incremental) review.
            echo "mode=super"                                       >> "$GITHUB_OUTPUT"
            echo "effort=xhigh"                                     >> "$GITHUB_OUTPUT"
            echo "max_findings=25"                                  >> "$GITHUB_OUTPUT"
            echo "per_chunk=10"                                     >> "$GITHUB_OUTPUT"
            echo "score_threshold=0"                                >> "$GITHUB_OUTPUT"
            echo "calls=4"                                          >> "$GITHUB_OUTPUT"
            echo "lines_before=16"                                  >> "$GITHUB_OUTPUT"
            echo "lines_after=8"                                    >> "$GITHUB_OUTPUT"
            echo 'push_commands=["/describe", "/review", "/improve"]' >> "$GITHUB_OUTPUT"
          elif [ "$IS_INCREMENTAL" = "true" ]; then
            echo "mode=incremental"                                 >> "$GITHUB_OUTPUT"
            echo "effort=medium"                                    >> "$GITHUB_OUTPUT"
            echo "max_findings=15"                                  >> "$GITHUB_OUTPUT"
            echo "per_chunk=6"                                      >> "$GITHUB_OUTPUT"
            echo "score_threshold=2"                                >> "$GITHUB_OUTPUT"
            echo "calls=3"                                          >> "$GITHUB_OUTPUT"
            echo "lines_before=8"                                   >> "$GITHUB_OUTPUT"
            echo "lines_after=4"                                    >> "$GITHUB_OUTPUT"
            echo 'push_commands=["/review -i"]'                     >> "$GITHUB_OUTPUT"
          else
            echo "mode=default"                                     >> "$GITHUB_OUTPUT"
            echo "effort=medium"                                    >> "$GITHUB_OUTPUT"
            echo "max_findings=15"                                  >> "$GITHUB_OUTPUT"
            echo "per_chunk=6"                                      >> "$GITHUB_OUTPUT"
            echo "score_threshold=2"                                >> "$GITHUB_OUTPUT"
            echo "calls=3"                                          >> "$GITHUB_OUTPUT"
            echo "lines_before=8"                                   >> "$GITHUB_OUTPUT"
            echo "lines_after=4"                                    >> "$GITHUB_OUTPUT"
            echo 'push_commands=["/describe", "/review -i", "/improve"]' >> "$GITHUB_OUTPUT"
          fi
          echo "Review mode: $(grep '^mode=' "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Authenticate to Google Cloud
        # Pinned for the same reason as the step below: `@v2` is a floating major
        # tag Google moves on every v2.x release, and this is the step that
        # actually consumes GCP_SA_KEY. Lower risk than a third-party action
        # (Google first-party, and floating major tags are conventional there),
        # but the mutability is the same class, so it gets the same treatment.
        #
        # This SHA is exactly where `v2` pointed when pinned: release v2.1.13
        # (2025-08-28), so behaviour is unchanged. v3.0.0 exists and is a
        # deliberate, separately-tested upgrade — not bundled here.
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: PR Agent Action
        # Pinned to a commit SHA, not `@main`: this step receives GCP_SA_KEY and
        # a write-scoped GITHUB_TOKEN, so a mutable ref means upstream can change
        # what runs with those secrets without review.
        #
        # The owner is pinned to the CURRENT name too. The repo moved
        # qodo-ai -> The-PR-Agent, so `qodo-ai/pr-agent` resolves only via
        # GitHub's rename redirect. Note this is NOT classic repojacking: the
        # `qodo-ai` org still exists and is still theirs, so only they could
        # break the redirect by creating a repo at the old path. It is a dangling
        # dependency on someone else's namespace hygiene, not an open door.
        #
        # This SHA is main@2026-07-20 (post-v0.39.0) — the exact code this setup
        # was validated against. Bump deliberately, after re-testing.
        #
        # PARTIAL MITIGATION, not a closed hole: the action's action.yaml builds
        # `FROM pragent/pr-agent:github_action`, a MUTABLE Docker Hub tag. Whoever
        # controls that registry repo can still change the code that runs against
        # these secrets. Closing that needs a digest pin
        # (`uses: docker://pragent/pr-agent@sha256:...`), which bypasses the action
        # wrapper and must be live-tested before adoption.
        uses: The-PR-Agent/pr-agent@1885eb4056887b8c8a530f0a35b842bba05cb425
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERTEXAI.VERTEX_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          # Must be "global" — Gemini 3.x is not served from regional endpoints.
          VERTEXAI.VERTEX_LOCATION: ${{ secrets.GCP_REGION }}
          CONFIG.MODEL: "vertex_ai/gemini-3.1-pro-preview"
          CONFIG.FALLBACK_MODELS: '["vertex_ai/gemini-2.5-pro"]'
          CONFIG.REASONING_EFFORT: ${{ steps.depth.outputs.effort }}
          CONFIG.PATCH_EXTRA_LINES_BEFORE: ${{ steps.depth.outputs.lines_before }}
          CONFIG.PATCH_EXTRA_LINES_AFTER: ${{ steps.depth.outputs.lines_after }}
          PR_REVIEWER.NUM_MAX_FINDINGS: ${{ steps.depth.outputs.max_findings }}
          PR_CODE_SUGGESTIONS.NUM_CODE_SUGGESTIONS_PER_CHUNK: ${{ steps.depth.outputs.per_chunk }}
          PR_CODE_SUGGESTIONS.SUGGESTIONS_SCORE_THRESHOLD: ${{ steps.depth.outputs.score_threshold }}
          PR_CODE_SUGGESTIONS.MAX_NUMBER_OF_CALLS: ${{ steps.depth.outputs.calls }}
          GITHUB_ACTION_CONFIG.AUTO_REVIEW: "true"
          GITHUB_ACTION_CONFIG.AUTO_DESCRIBE: "true"
          GITHUB_ACTION_CONFIG.AUTO_IMPROVE: "true"
          GITHUB_ACTION_CONFIG.HANDLE_PUSH_TRIGGER: "true"
          GITHUB_ACTION_CONFIG.PUSH_COMMANDS: ${{ steps.depth.outputs.push_commands }}
