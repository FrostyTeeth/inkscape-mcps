name: PR-Agent Reviewer

# CodeRabbit replacement — see .pr_agent.toml for review configuration.
on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created, edited]

jobs:
  pr_agent_job:
    # Skip draft PRs (mirrors CodeRabbit `drafts: false`), and only act on
    # comments that belong to a PR rather than a plain issue.
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    name: Run PR Agent
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: PR Agent Action
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERTEXAI.VERTEX_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          VERTEXAI.VERTEX_LOCATION: ${{ secrets.GCP_REGION }}
          CONFIG.MODEL: "vertex_ai/gemini-2.5-pro"
          CONFIG.FALLBACK_MODELS: '["vertex_ai/gemini-2.5-flash"]'
          GITHUB_ACTION_CONFIG.AUTO_REVIEW: "true"
          GITHUB_ACTION_CONFIG.AUTO_DESCRIBE: "true"
          GITHUB_ACTION_CONFIG.AUTO_IMPROVE: "true"
          GITHUB_ACTION_CONFIG.HANDLE_PUSH_TRIGGER: "true"
          GITHUB_ACTION_CONFIG.PUSH_COMMANDS: '["/describe", "/review", "/improve"]'
